[package]
name = "provider-sync"
description = "Service-side sync trait + per-provider impls; carries the service-state dep that common no longer holds (Phase 6d-B)"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true

[lints]
workspace = true

[dependencies]
async-trait = "0.1"
serde.workspace = true
serde_json.workspace = true
rusqlite.workspace = true
chrono.workspace = true
tokio = { workspace = true, features = ["net", "io-util", "sync", "macros", "time"] }
log = "0.4"
futures = "0.3"
sha2 = "0.11"
tokio-util = "0.7"
urlencoding = "2"
bifrost-jmap = { git = "file:///home/folk/Programs/jmap-client", rev = "b3d207c", default-features = false, features = ["tls-native", "websockets", "mail", "calendars", "contacts"] }

# Extracted workspace crates
db = { path = "../db" }
common = { path = "../common" }
service-state = { path = "../service-state" }
store = { path = "../stores" }
search = { path = "../search" }
seen = { path = "../seen" }
sync = { path = "../sync" }

# Provider crates: provider-sync owns the orphan-impls of
# `ProviderSyncOps` for each provider's `Ops` type. The trait is
# defined in this crate, so the orphan rule is satisfied even though
# the impl-target type lives in the provider crate.
gmail = { path = "../gmail" }
jmap = { path = "../jmap" }
graph = { path = "../graph" }
imap = { path = "../imap" }

[dev-dependencies]
tempfile = "3"
