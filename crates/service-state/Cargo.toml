[package]
name = "service-state"
description = "Service-only writer-half state types. The `app` crate does NOT depend on this crate, so `WriteDbState` and friends are unreachable from UI code at the dependency-graph level (per docs/service/phase-2-plan.md scope item 1)."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true

[lints]
workspace = true

[dependencies]
db = { path = "../db" }
log = "0.4"
rusqlite.workspace = true
search = { path = "../search" }
store = { path = "../stores" }
tokio = { workspace = true, features = ["rt", "sync"] }

[dev-dependencies]
tempfile = "3"
tokio = { workspace = true, features = ["rt", "macros", "rt-multi-thread"] }
toml = "1.1"
