[package]
name = "store"
description = "Content stores for Ratatoskr: email bodies, inline images, attachment cache"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true

[lints]
workspace = true

[dependencies]
db = { path = "../db" }

rusqlite.workspace = true
tokio = { workspace = true, features = ["sync", "rt"] }
base64.workspace = true
serde.workspace = true
log = "0.4"
flate2 = { version = "1", features = ["zlib-rs"], default-features = false }
xxhash-rust = { version = "0.8.15", features = ["xxh3"] }
hotpath = { workspace = true, optional = true }

[features]
hotpath = ["dep:hotpath", "hotpath/hotpath", "db/hotpath"]
hotpath-alloc = ["hotpath", "hotpath/hotpath-alloc", "db/hotpath-alloc"]
