[package]
name = "smtp"
description = "SMTP client for Ratatoskr"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true

[lints]
workspace = true

[dependencies]
common = { path = "../common" }

serde.workspace = true
lettre = { version = "0.11.21", default-features = false, features = ["smtp-transport", "tokio1-native-tls", "builder"] }
mail-parser = "0.11"
log = "0.4"
hotpath = { workspace = true, optional = true }

[features]
hotpath = ["dep:hotpath", "hotpath/hotpath", "common/hotpath"]
hotpath-alloc = ["hotpath", "hotpath/hotpath-alloc", "common/hotpath-alloc"]
