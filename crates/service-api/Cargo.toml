[package]
name = "service-api"
version.workspace = true
edition.workspace = true
rust-version.workspace = true

[lints]
workspace = true

[dependencies]
serde.workspace = true
serde_json.workspace = true
thiserror.workspace = true
tokio = { workspace = true, features = ["io-util", "macros", "rt", "time"] }
uuid = { version = "1.23.1", features = ["v4", "v7", "serde"] }

[features]
# Adds `RequestParams::Test*` variants and parser routing for harness-only
# fault injection and fixtures. Off by default; `brokkr check`'s
# `--all-features` turns it on for tests, production builds leave it off so
# the test variants never reach the wire.
test-helpers = []
