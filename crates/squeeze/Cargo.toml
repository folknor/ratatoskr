[package]
name = "squeeze"
version = "0.1.0"
description = "Transparent email attachment compression"
authors = ["folknor"]
license = "Apache-2.0"
edition = "2024"

[lib]
name = "squeeze"
path = "src/lib.rs"

[[bin]]
name = "squeeze"
path = "src/main.rs"

[features]
default = []
heic = ["dep:libheif-rs"]

[dependencies]
image = { version = "0.25", default-features = false, features = [
    "jpeg",
    "png",
    "webp",
    "bmp",
    "tiff",
    "gif",
    "rayon",
] }
mozjpeg-rs = "0.9"
oxipng = { version = "10", default-features = false, features = ["parallel"] }
lopdf = "0.39"
zip = { version = "2", default-features = false, features = ["deflate"] }
quick-xml = "0.37"
base64 = "0.22"
thiserror = "2"
clap = { version = "4", features = ["derive"] }

[dependencies.libheif-rs]
version = "1"
optional = true

[lints.clippy]
uninlined_format_args = "deny"
cloned_instead_of_copied = "deny"
redundant_closure_for_method_calls = "deny"
semicolon_if_nothing_returned = "deny"
manual_string_new = "deny"
explicit_iter_loop = "deny"
implicit_clone = "deny"
needless_pass_by_value = "deny"
unnecessary_sort_by = "deny"
collapsible_match = "deny"
if_same_then_else = "deny"
needless_borrow = "deny"
ptr_arg = "deny"
redundant_locals = "deny"
regex_creation_in_loops = "deny"
unnecessary_unwrap = "deny"
wrong_self_convention = "deny"
unwrap_in_result = "deny"
ok_expect = "deny"
await_holding_lock = "deny"
await_holding_refcell_ref = "deny"
large_enum_variant = "deny"
clone_on_ref_ptr = "deny"
float_cmp = "deny"
cast_sign_loss = "deny"
cast_possible_truncation = "deny"
cast_possible_wrap = "deny"
unwrap_used = "deny"
