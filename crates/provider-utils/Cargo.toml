[package]
name = "ratatoskr-provider-utils"
description = "Shared provider utilities for Ratatoskr email providers"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true

[lints]
workspace = true

[dependencies]
# Workspace deps
serde.workspace = true
serde_json.workspace = true
reqwest.workspace = true
base64.workspace = true
chrono.workspace = true
rusqlite.workspace = true

# Extracted workspace crates
ratatoskr-db = { path = "../db" }
ratatoskr-stores = { path = "../stores" }
ratatoskr-search = { path = "../search" }
ratatoskr-seen-addresses = { path = "../seen-addresses" }

# Crate-specific deps
tokio = { workspace = true, features = ["sync"] }
log = "0.4"
async-trait = "0.1"
unicode-segmentation = "1.12"
zeroize = "1"
regex = "1"
xxhash-rust = { version = "0.8.15", features = ["xxh3"] }
css-inline = "0.20"
lol_html = "2"
ammonia = "4"
aes-gcm = "0.10"
getrandom = { version = "0.2", features = ["std"] }
