[package]
name = "app"
version.workspace = true
edition.workspace = true
rust-version.workspace = true

[lints]
workspace = true

[dependencies]
# Workspace deps
serde.workspace = true
serde_json.workspace = true
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "sync"] }
rusqlite.workspace = true
chrono.workspace = true

# Crate-specific deps
#iced = { git = "https://github.com/squidowl/iced", rev = "b201e4f", default-features = false, features = [
#    "wgpu", "tokio", "lazy", "advanced", "canvas", "web-colors", "wayland", "x11",
#] }
iced = { git = "https://github.com/folknor/iced", branch = "sluggrs", default-features = false, features = [
    "wgpu", "tokio", "lazy", "advanced", "canvas", "web-colors", "wayland", "x11",
] }
dirs = "6"
dissimilar.workspace = true
ratatoskr-system-fonts = { path = "../system-fonts" }
ratatoskr-command-palette = { path = "../command-palette" }
ratatoskr-core = { path = "../core" }
ratatoskr-label-colors = { path = "../label-colors" }
uuid = { version = "1", features = ["v4"] }
toml = "0.8"
mundy = { version = "0.1.9", default-features = false, features = ["color-scheme", "tokio", "log"] }
display-info = "0.5"
rfd = "0.15"
