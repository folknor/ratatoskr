from = "rtsk"
forbid = ["service", "service-state", "cal", "app"]

[[dependency_rule]]
name = "service-api-is-pure-leaf"
from = "service-api"
forbid = [
    "db", "db-read", "rusqlite",
    "rtsk", "service", "service-state", "action-types",
    "store", "search", "common", "cal", "calendar",
    "sync", "provider-sync",
    "gmail", "jmap", "graph", "imap", "smtp",
    "smart-folder", "seen", "ai", "import", "dev-seed",
    "app", "runner",
]

# dev-seed is intentionally allowed only through development feature flags.
# runner disables app default features for production and exposes
# `runner/dev-seed` as the explicit opt-in. The regression test in
# `crates/runner/src/main.rs` pins that manifest shape.

[[dependency_rule]]
name = "sync-no-upward"
from = "sync"
forbid = ["app", "service", "service-state", "cal", "gmail", "jmap", "graph", "imap", "provider-sync"]

[[dependency_rule]]
