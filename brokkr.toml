project = "ratatoskr"

[ratatoskr]
mock_server_binary = "/home/folk/.cargo/bin/saehrimnir"
fixtures_dir = "crates/app/tests/sync-fixtures"
test_endpoint_env_jmap = "RATATOSKR_TEST_JMAP_ENDPOINT"
test_endpoint_env_imap = "RATATOSKR_TEST_IMAP_ENDPOINT"
test_endpoint_env_smtp = "RATATOSKR_TEST_SMTP_ENDPOINT"
test_endpoint_env_graph = "RATATOSKR_TEST_GRAPH_ENDPOINT"
test_endpoint_env_gmail = "RATATOSKR_TEST_GMAIL_ENDPOINT"
test_endpoint_env_caldav = "RATATOSKR_TEST_CALDAV_ENDPOINT"
test_endpoint_env_people = "RATATOSKR_TEST_PEOPLE_ENDPOINT"
test_endpoint_env_gcal = "RATATOSKR_TEST_GCAL_ENDPOINT"
sync_script_dir = "crates/app/tests/sync-harness"

[ratatoskr.harness]
package = "app"
debug = true

[ratatoskr.gate.jmap_steady_state_delta]
script = "crates/app/tests/sync-harness/jmap-steady-state-delta.lua"
baseline_label = "2026-05-10 clean-tree jmap steady-state green"

[ratatoskr.gate.jmap_steady_state_delta.baseline]
# Other hosts and CI must record their own baseline with --as-baseline
# before running this gate.
plantasjen = "5399393bfded447aba4176b586a5905c"

[ratatoskr.gate.jmap_steady_state_delta.metrics.elapsed_ms]
# Relative catches normal drift from the host baseline; absolute catches
# gross hangs even when a local baseline is already slow.
max_relative = 1.25
max = 5000

[ratatoskr.gate.jmap_steady_state_delta.metrics.success]
equal = 1

[ratatoskr.gate.jmap_steady_state_delta.metrics.exit_code]
equal = 0

[ratatoskr.gate.jmap_steady_state_delta.metrics."sidecar.rss_peak_kb"]
max_relative = 1.20

[ratatoskr.gate.jmap_steady_state_delta.metrics."meta.provider_requests"]
# Exact-match by design: any new provider request should be reviewed
# and either justified with a new baseline or fixed.
max_delta = 0

[ratatoskr.gate.jmap_steady_state_delta.metrics."meta.message_count"]
equal_to_baseline = true

[ratatoskr.gate.jmap_steady_state_delta.metrics."meta.correct"]
equal = 1
