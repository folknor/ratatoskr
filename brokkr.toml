project = "ratatoskr"

[[dependency_rule]]
name = "app-no-rusqlite"
from = "app"
forbid = "rusqlite"

[[dependency_rule]]
name = "core-no-rusqlite"
from = "rtsk"
forbid = "rusqlite"

[[dependency_rule]]
name = "core-no-writer-db"
from = "rtsk"
forbid = ["db", "rusqlite", "service-state", "service", "action-types"]

[[dependency_rule]]
name = "app-no-service-state"
from = "app"
forbid = "service-state"

[[dependency_rule]]
name = "app-no-db-internals"
from = "app"
forbid = ["db", "db-read", "rusqlite", "service-state", "service", "action-types", "common"]

[[dependency_rule]]
name = "service-no-app"
from = "service"
forbid = "app"

[[dependency_rule]]
name = "app-no-providers"
from = "app"
forbid = ["gmail", "jmap", "graph", "imap", "provider-sync"]

[[dependency_rule]]
name = "common-stays-leafward"
from = "common"
forbid = ["gmail", "jmap", "graph", "imap", "provider-sync", "sync", "rtsk", "service", "service-state", "cal", "app"]

[[dependency_rule]]
name = "core-no-upward"
from = "rtsk"
forbid = ["service", "service-state", "cal", "app"]

[[dependency_rule]]
name = "service-api-is-pure-leaf"
from = "service-api"
forbid = [
    "db", "db-read", "rusqlite",
    "rtsk", "service", "service-state", "action-types",
    "store", "search", "common", "cal", "calendar",
    "sync", "provider-sync",
    "gmail", "jmap", "graph", "imap", "smtp",
    "smart-folder", "seen", "ai", "import", "dev-seed",
    "app", "runner",
]

# dev-seed is intentionally allowed only through development feature flags.
# runner disables app default features for production and exposes
# `runner/dev-seed` as the explicit opt-in. The regression test in
# `crates/runner/src/main.rs` pins that manifest shape.

[[dependency_rule]]
name = "sync-no-upward"
from = "sync"
forbid = ["app", "service", "service-state", "cal", "gmail", "jmap", "graph", "imap", "provider-sync"]

[[dependency_rule]]
name = "gmail-boundaries"
from = "gmail"
forbid = ["jmap", "graph", "imap", "app", "service", "service-state", "cal", "rtsk", "provider-sync"]

[[dependency_rule]]
name = "jmap-boundaries"
from = "jmap"
forbid = ["gmail", "graph", "imap", "app", "service", "service-state", "cal", "rtsk", "provider-sync"]

[[dependency_rule]]
name = "graph-boundaries"
from = "graph"
forbid = ["gmail", "jmap", "imap", "app", "service", "service-state", "cal", "rtsk", "provider-sync"]

[[dependency_rule]]
name = "imap-boundaries"
from = "imap"
forbid = ["gmail", "jmap", "graph", "app", "service", "service-state", "cal", "rtsk", "provider-sync"]

[[dependency_rule]]
name = "cal-no-app"
from = "cal"
forbid = "app"

[ratatoskr]
mock_server_binary = "/home/folk/.cargo/bin/saehrimnir"
fixtures_dir = "crates/app/tests/sync-fixtures"
test_endpoint_env_jmap = "RATATOSKR_TEST_JMAP_ENDPOINT"
test_endpoint_env_imap = "RATATOSKR_TEST_IMAP_ENDPOINT"
test_endpoint_env_smtp = "RATATOSKR_TEST_SMTP_ENDPOINT"
test_endpoint_env_graph = "RATATOSKR_TEST_GRAPH_ENDPOINT"
test_endpoint_env_gmail = "RATATOSKR_TEST_GMAIL_ENDPOINT"
test_endpoint_env_caldav = "RATATOSKR_TEST_CALDAV_ENDPOINT"
test_endpoint_env_people = "RATATOSKR_TEST_PEOPLE_ENDPOINT"
test_endpoint_env_gcal = "RATATOSKR_TEST_GCAL_ENDPOINT"
sync_script_dir = "crates/app/tests/sync-harness"

[ratatoskr.harness]
package = "runner"
binary = "ratatoskr"
debug = true

[ratatoskr.gate.jmap_steady_state_delta]
script = "crates/app/tests/sync-harness/jmap-steady-state-delta.lua"
baseline_label = "2026-05-10 clean-tree jmap steady-state green"

[ratatoskr.gate.jmap_steady_state_delta.baseline]
# Other hosts and CI must record their own baseline with --as-baseline
# before running this gate.
plantasjen = "5399393bfded447aba4176b586a5905c"

[ratatoskr.gate.jmap_steady_state_delta.metrics.elapsed_ms]
# Relative catches normal drift from the host baseline; absolute catches
# gross hangs even when a local baseline is already slow.
max_relative = 1.25
max = 5000

[ratatoskr.gate.jmap_steady_state_delta.metrics.success]
equal = 1

[ratatoskr.gate.jmap_steady_state_delta.metrics.exit_code]
equal = 0

[ratatoskr.gate.jmap_steady_state_delta.metrics."sidecar.rss_peak_kb"]
max_relative = 1.20

[ratatoskr.gate.jmap_steady_state_delta.metrics."meta.provider_requests"]
# Exact-match by design: any new provider request should be reviewed
# and either justified with a new baseline or fixed.
max_delta = 0

[ratatoskr.gate.jmap_steady_state_delta.metrics."meta.message_count"]
equal_to_baseline = true

[ratatoskr.gate.jmap_steady_state_delta.metrics."meta.correct"]
equal = 1
